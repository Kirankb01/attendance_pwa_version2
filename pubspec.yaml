name: face_poc
description: Face Recognition POC - Browser-based face registration and matching

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Modern web interop (replaces dart:html + dart:js for dart2wasm)
  web: ^1.1.0

  # Local storage for embeddings
  shared_preferences: ^2.3.0

  # UI
  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true


flutter_icons:
  web:
    generate: true
    image_path: "assets/icon.png"

