<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Face Recognition POC">

  <!-- PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FacePOC">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <title>Face Recognition POC</title>
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- face-api.js — TensorFlow-backed face detection + 128-d embeddings, no server needed -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    /* Prevent FOUC */
    body { margin: 0; background-color: #0A0E1A; }

    /* face-api video overlay helper used by JS bridge */
    #face-overlay-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <!-- Face-API JS Bridge — called from Flutter via dart:js -->
  <script>
    // ─── Model loading state ────────────────────────────────────────────────
    window.faceApiReady = false;
    window.faceApiError = null;

    // Models are hosted on jsDelivr CDN — no backend needed
    const MODEL_URL = '/models';

    async function loadFaceApiModels() {
      try {
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
        ]);
        window.faceApiReady = true;
        console.log('[FacePOC] face-api models loaded ✓');
        // Notify Flutter if callback registered
        if (window.onFaceApiReady) window.onFaceApiReady();
      } catch (e) {
        window.faceApiError = e.message;
        console.error('[FacePOC] model load failed:', e);
      }
    }

    // Wait for face-api script to load, then load models
    document.addEventListener('DOMContentLoaded', () => {
      const checkInterval = setInterval(() => {
        if (typeof faceapi !== 'undefined') {
          clearInterval(checkInterval);
          loadFaceApiModels();
        }
      }, 100);
    });

    // ─── Core API exposed to Flutter via dart:js ────────────────────────────

    /**
     * Generate a 128-dimensional face embedding from a base64 image.
     * Returns: { success: bool, embedding: number[] | null, error: string | null }
     */
    window.generateFaceEmbedding = async function(base64Image) {
      if (!window.faceApiReady) {
        return JSON.stringify({ success: false, embedding: null, error: 'Models not loaded yet' });
      }
      try {
        const img = await createImageFromBase64(base64Image);
        const detection = await faceapi
          .detectSingleFace(img)
          .withFaceLandmarks()
          .withFaceDescriptor();

        if (!detection) {
          return JSON.stringify({ success: false, embedding: null, error: 'NO_FACE_DETECTED' });
        }

        const embedding = Array.from(detection.descriptor); // Float32Array → plain array
        return JSON.stringify({ success: true, embedding, error: null });
      } catch (e) {
        return JSON.stringify({ success: false, embedding: null, error: e.message });
      }
    };

    /**
     * Compare two embeddings using Euclidean distance (same as face-api LabeledFaceDescriptors).
     * Threshold: < 0.6 = same person (industry standard for this model).
     * Returns: { match: bool, distance: number, confidence: number }
     */
    window.compareEmbeddings = function(embeddingA, embeddingB) {
      try {
        const a = JSON.parse(embeddingA);
        const b = JSON.parse(embeddingB);

        if (a.length !== b.length) {
          return JSON.stringify({ match: false, distance: 1.0, confidence: 0 });
        }

        // Euclidean distance
        let sum = 0;
        for (let i = 0; i < a.length; i++) {
          sum += (a[i] - b[i]) ** 2;
        }
        const distance = Math.sqrt(sum);

        // face-api threshold: 0.6 (lower = more similar)
        const THRESHOLD = 0.6;
        const match = distance < THRESHOLD;

        // Convert distance to confidence 0–100
        // distance 0 → 100%, distance 0.6 → 0%, distance > 0.6 → clamped 0
        const confidence = Math.max(0, Math.round((1 - distance / THRESHOLD) * 100));

        return JSON.stringify({ match, distance: parseFloat(distance.toFixed(4)), confidence });
      } catch (e) {
        return JSON.stringify({ match: false, distance: 1.0, confidence: 0, error: e.message });
      }
    };

    /**
     * Check models loaded status
     */
    window.getFaceApiStatus = function() {
      return JSON.stringify({
        ready: window.faceApiReady,
        error: window.faceApiError
      });
    };

    // ─── Helpers ────────────────────────────────────────────────────────────

    function createImageFromBase64(base64) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        // Handle both raw base64 and data URL
        img.src = base64.startsWith('data:') ? base64 : `data:image/jpeg;base64,${base64}`;
      });
    }
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
